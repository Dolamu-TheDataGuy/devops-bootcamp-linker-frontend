name: DevSecOps Pipeline

on:
    workflow_dispatch:
    pull_request:
        branches:
            - main
        paths-ignore:
            - ".github/workflows"
            - "**/*.md"

jobs:
    notify-slack:
        runs-on: ubuntu-latest
        steps:
            - name: Send Slack Notification on Push/PR
              uses: rtCamp/action-slack-notify@v2
              env:
                SLACK_CHANNEL: github-notifications
                SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
                SLACK_MESSAGE: |
                    **Event**: https://github.com/${{ github.actor }} just made ${{ github.event_name }}!

                    **Repository**: ${{ github.event.pull_request.html_url }}

                    **GitHub Branch**: ${{ github.ref_name }}

                    **Commit Message**: ${{ github.event.pull_request.title }}
                SLACK_TITLE: DevSecOps Advertiser Dashboard Pipeline
                MSG_MINIMAL: true
                SLACKIFY_MARKDOWN: true

    lint:
        name: Lint Codebase
        runs-on: ubuntu-latest
        steps:
            - name: Checkout Code
              uses: actions/checkout@v4

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                node-version: '20.x'
                cache: 'npm'

            - name: Install Dependencies
              run: npm ci
            

            - name: Get changed files
              id: changed-files
              uses: tj-actions/changed-files@v34
              with:
                files: |
                    '**/*.js'
                    '**/*.jsx'
                    '**/*.ts'
                    '**/*.tsx'

            - name: Run ESLint on changed files
              if: steps.changed-files.outputs.any_changed == 'true'
              run: |
                echo "Running ESLint on changed files..."
                npx eslint ${{ steps.changed-files.outputs.added_modified_files }}

            - name: Skip linting
              if: steps.changed-files.outputs.any_changed == 'false'
              run: echo "No relevant files changed, skipping linting."


    sca:
        name: Software Composition Analysis (SCA)
        runs-on: ubuntu-latest
        steps:
            - name: Checkout Code
              uses: actions/checkout@v4
              
            - name: Set up Node.js
              uses: actions/setup-node@v3
              with:
                node-version: '20.x'
                cache: 'npm'

            - name: Install Dependencies
              run: npm ci
            
            - name: Run npm audit
              run: |
                npm audit --json > npm-audit-report.json || true
                jq -e '
                    (.metadata.vulnerabilities // .data.vulnerabilities // {}) as $v
                    | (($v.moderate // 0) + ($v.high // 0) + ($v.critical // 0)) == 0
                ' npm-audit-report.json > /dev/null || true
            
            - name: Upload npm Audit Report
              uses: actions/upload-artifact@v4
              if: always()
              with:
                name: sca-report
                path: |
                    reports
                    npm-audit-report.json
    
    sast:
        name: semgrep/ci
        runs-on: ubuntu-latest
        permissions:
            contents: read
        container:
            image: semgrep/semgrep:latest

        steps:
            - uses: actions/checkout@v4

            - name: Run semgrep
              run: semgrep scan --error --json-output=semgrep-report.json
              env:
                SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

            
            - name: Upload Semgrep Report
              uses: actions/upload-artifact@v4
              if: always()
              with:
                name: semgrep-report
                path: semgrep-report.json

            - name: Slack Notification on Failure
              if: ${{ failure()}}
              uses: rtCamp/action-slack-notify@v2
              env:
                SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
                SLACK_COLOR: ${{ job.status }}
                SLACK_MESSAGE_ON_FAILURE: "DevSecOps Pipeline failed!"

            
            - name: Slack Notification on Success
              if: ${{ success()}}
              uses: rtCamp/action-slack-notify@v2
              env:
                SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
                SLACK_COLOR: ${{ job.status }}
                SLACK_MESSAGE_ON_SUCCESS: "DevSecOps Pipeline succeeded!"

            - name: Slack Notification with Aritifact Link
              if: always()
              uses: rtCamp/action-slack-notify@v2
              env:
                SLACK_COLOR: ${{ job.status }}
                SLACK_MESSAGE_ON_SUCCESS: "Get DevSecOps Reports here: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                SLACK_MESSAGE_ON_FAILURE: "Get DevSecOps Reports here: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                SLACK_MSG_AUTHOR: ${{ github.actor }}
                MSG_MINIMAL: true
                SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
            